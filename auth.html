<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeepPulse – Authentication</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    :root {
      --bg: #080c14;
      --bg2: #0d1320;
      --bg3: #111827;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --cyan: #38bdf8;
      --blue: #6366f1;
      --text: #f1f5f9;
      --text2: #94a3b8;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #080c14 0%, #0d1320 50%, #111827 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
      padding: 2rem;
      animation: fadeInUp 0.8s ease-out;
    }

    .auth-card {
      background: rgba(13, 19, 32, 0.8);
      border: 0.5px solid rgba(56, 189, 248, 0.2);
      border-radius: 16px;
      padding: 2.5rem;
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      letter-spacing: -0.5px;
    }

    .auth-logo span { color: var(--cyan); }

    .auth-subtitle {
      font-size: 0.9rem;
      color: var(--text2);
      line-height: 1.5;
    }

    .auth-tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 0.5px solid rgba(255,255,255,0.08);
    }

    .auth-tab {
      flex: 1;
      padding: 1rem 0;
      text-align: center;
      background: none;
      border: none;
      color: var(--text2);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      border-bottom: 2px solid transparent;
    }

    .auth-tab.active {
      color: var(--cyan);
      border-bottom-color: var(--cyan);
    }

    .auth-tab:hover {
      color: var(--text);
    }

    .auth-form {
      display: none;
    }

    .auth-form.active {
      display: block;
      animation: fadeInUp 0.4s ease-out;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text2);
      margin-bottom: 0.6rem;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .form-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 0.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 0.9rem 1rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.3s ease;
    }

    .form-input:focus {
      border-color: var(--cyan);
      background: rgba(56, 189, 248, 0.05);
      box-shadow: 0 0 16px rgba(56, 189, 248, 0.15);
    }

    .auth-button {
      width: 100%;
      background: var(--cyan);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 1rem;
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 1rem;
      letter-spacing: 0.2px;
    }

    .auth-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(56, 189, 248, 0.3);
    }

    .auth-button:active {
      transform: translateY(0);
    }

    .auth-button.secondary {
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      border: 0.5px solid rgba(255, 255, 255, 0.08);
    }

    .auth-button.secondary:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      opacity: 0.5;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 0.5px;
      background: rgba(255, 255, 255, 0.1);
    }

    .auth-divider span {
      font-size: 0.8rem;
      color: var(--text2);
    }

    .auth-footer {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text2);
    }

    .auth-footer a {
      color: var(--cyan);
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.3s ease;
    }

    .auth-footer a:hover {
      opacity: 0.8;
    }

    .error-message {
      background: rgba(248, 113, 113, 0.1);
      border: 0.5px solid rgba(248, 113, 113, 0.3);
      color: #f87171;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
      animation: slideInUp 0.3s ease;
    }

    .success-message {
      background: rgba(52, 211, 153, 0.1);
      border: 0.5px solid rgba(52, 211, 153, 0.3);
      color: #34d399;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
      animation: slideInUp 0.3s ease;
    }

    .loading {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(56, 189, 248, 0.3);
      border-radius: 50%;
      border-top-color: var(--cyan);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .fadeInUp {
      animation: fadeInUp 0.6s ease-out;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">Deep<span>Pulse</span></div>
        <p class="auth-subtitle">Deep Work & Attention Recovery</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Sign In</button>
        <button class="auth-tab" data-tab="signup">Create Account</button>
      </div>

      <!-- Login Form -->
      <form class="auth-form active" id="login-form" data-tab="login">
        <div class="error-message" id="login-error"></div>
        <div class="success-message" id="login-success"></div>

        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="login-email" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="login-password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="auth-button" id="login-btn">Sign In</button>

        <div class="auth-divider">
          <span>or</span>
        </div>

        <button type="button" class="auth-button secondary" onclick="handleGoogleAuth()">
          🔐 Continue with Google
        </button>

        <div class="auth-footer">
          Forgot your password? <a onclick="alert('Password reset coming soon!')">Reset here</a>
        </div>
      </form>

      <!-- Signup Form -->
      <form class="auth-form" id="signup-form" data-tab="signup">
        <div class="error-message" id="signup-error"></div>
        <div class="success-message" id="signup-success"></div>

        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-input" id="signup-name" placeholder="John Doe" required>
        </div>

        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="signup-email" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="signup-password" placeholder="••••••••" required>
        </div>

        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-input" id="signup-confirm" placeholder="••••••••" required>
        </div>

        <button type="submit" class="auth-button" id="signup-btn">Create Account</button>

        <div class="auth-divider">
          <span>or</span>
        </div>

        <button type="button" class="auth-button secondary" onclick="handleGoogleAuth()">
          🔐 Sign up with Google
        </button>

        <div class="auth-footer">
          By signing up, you agree to our <a href="#">Terms of Service</a>
        </div>
      </form>
    </div>
  </div>

  <!-- Supabase Library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.0"></script>

  <!-- Initialize Supabase and Global Google Auth Handler -->
  <script>
    // Initialize Supabase
    const SUPABASE_URL = 'https://xrvjjcfecjyeidlhujfk.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_alkhTOsQZcVlk6esMhQ_Yw_9o0ZA2yz';
    window.supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Google Auth Handler
    window.handleGoogleAuth = async function(e) {
      if (e) e.preventDefault();
      
      try {
        const btn = event.target.closest('button');
        const origText = btn.textContent;
        btn.textContent = '🔄 Redirecting to Google...';
        btn.disabled = true;
        
        const { data, error } = await window.supabase.auth.signInWithOAuth({
          provider: 'google',
          options: {
            redirectTo: 'https://deep-pulse-murex.vercel.app/auth.html',
            queryParams: {
              access_type: 'offline',
              prompt: 'consent'
            }
          }
        });
        
        if (error) throw error;
      } catch (error) {
        console.error('Google auth error:', error);
        const activeTab = document.querySelector('.auth-tab.active').dataset.tab;
        const errorEl = document.getElementById(activeTab + '-error');
        errorEl.textContent = '✗ ' + (error.message || 'Google authentication failed');
        errorEl.style.display = 'block';
        
        const btn = event.target.closest('button');
        btn.textContent = '🔐 Continue with Google';
        btn.disabled = false;
      }
    };
  </script>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.0/dist/module/index.js';
    const supabase = window.supabase;

    // Tab switching
    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const tabName = tab.dataset.tab;
        
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
        
        tab.classList.add('active');
        document.querySelector(`#${tabName}-form`).classList.add('active');
      });
    });

    // Login handler
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const btn = document.getElementById('login-btn');
      
      const origText = btn.textContent;
      btn.textContent = '🔄 Signing in...';
      btn.disabled = true;
      
      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        
        if (error) throw error;
        
        document.getElementById('login-success').textContent = '✓ Sign in successful! Redirecting...';
        document.getElementById('login-success').style.display = 'block';
        
        setTimeout(() => window.location.href = 'app.html', 1500);
      } catch (error) {
        document.getElementById('login-error').textContent = '✗ ' + error.message;
        document.getElementById('login-error').style.display = 'block';
      } finally {
        btn.textContent = origText;
        btn.disabled = false;
      }
    });

    // Signup handler
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('signup-name').value;
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      const confirm = document.getElementById('signup-confirm').value;
      
      if (password !== confirm) {
        document.getElementById('signup-error').textContent = '✗ Passwords do not match';
        document.getElementById('signup-error').style.display = 'block';
        return;
      }
      
      const btn = document.getElementById('signup-btn');
      const origText = btn.textContent;
      btn.textContent = '🔄 Creating account...';
      btn.disabled = true;
      
      try {
        const { data, error } = await supabase.auth.signUp({ 
          email, 
          password,
          options: {
            data: { full_name: name }
          }
        });
        
        if (error) throw error;
        
        document.getElementById('signup-success').textContent = '✓ Account created! Redirecting...';
        document.getElementById('signup-success').style.display = 'block';
        
        setTimeout(() => window.location.href = 'app.html', 1500);
      } catch (error) {
        document.getElementById('signup-error').textContent = '✗ ' + error.message;
        document.getElementById('signup-error').style.display = 'block';
      } finally {
        btn.textContent = origText;
        btn.disabled = false;
      }
    });

    // Check if user is already logged in or just signed in
    supabase.auth.onAuthStateChange((event, session) => {
      console.log('Auth state changed:', event, session?.user?.email);
      
      // Redirect to app.html when user is authenticated
      if (session && session.user) {
        // Give a small delay to ensure session is fully established
        setTimeout(() => {
          window.location.href = 'app.html';
        }, 500);
      }
    });
  </script>
</body>
</html>
